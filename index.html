<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Scanner — Pokémon & Yu-Gi-Oh</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent-poke: #ffcb05;
    --accent-ygo: #8b2fc9;
    --accent-blue: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow-poke: 0 0 30px rgba(255,203,5,0.3);
    --glow-ygo: 0 0 30px rgba(139,47,201,0.3);
    --card-w: 420px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent-poke) 0%, #fff 40%, var(--accent-ygo) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .logo-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
    margin: 20px auto;
    max-width: 300px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.06), transparent 70%);
    pointer-events: none;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent-blue);
    box-shadow: 0 0 40px rgba(59,130,246,0.15);
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(255,203,5,0.4));
  }

  .upload-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .upload-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .upload-hint span {
    color: var(--accent-blue);
    cursor: pointer;
  }

  #fileInput { display: none; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
    color: #fff;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,0.4); }
  .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

  /* Preview image */
  .preview-wrap {
    display: none;
    text-align: center;
    margin-bottom: 24px;
  }

  .preview-wrap img {
    max-width: 280px;
    max-height: 380px;
    border-radius: 12px;
    border: 2px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    object-fit: contain;
  }

  /* Status */
  .status-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: none;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-blue);
    flex-shrink: 0;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status-text {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Result card */
  .result-card {
    display: none;
    background: var(--panel);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 24px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    border-bottom: 1px solid var(--border);
  }

  .card-type-badge {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .badge-pokemon {
    background: rgba(255,203,5,0.15);
    color: var(--accent-poke);
    border: 1px solid rgba(255,203,5,0.3);
  }

  .badge-yugioh {
    background: rgba(139,47,201,0.15);
    color: #c084fc;
    border: 1px solid rgba(139,47,201,0.3);
  }

  .result-info { flex: 1; }

  .result-name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .result-meta {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .result-meta strong { color: var(--text); }

  /* Prices */
  .prices-section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }

  .price-item {
    background: #0a0a0f;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    transition: transform 0.2s;
  }

  .price-item:hover { transform: translateY(-2px); }

  .price-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .price-value {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
  }

  .price-normal { color: #22c55e; }
  .price-holofoil { color: var(--accent-poke); text-shadow: var(--glow-poke); }
  .price-reverseHolo { color: #60a5fa; }
  .price-1stEdition { color: #f97316; }
  .price-unlimited { color: #a78bfa; }
  .price-low { color: #22c55e; }
  .price-mid { color: var(--accent-poke); }
  .price-high { color: #f97316; }
  .price-market { color: #c084fc; text-shadow: var(--glow-ygo); }

  /* Description */
  .desc-section {
    padding: 24px;
  }

  .ai-description {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    font-style: italic;
    border-left: 2px solid var(--accent-blue);
    padding-left: 16px;
  }

  /* Error */
  .error-box {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: #fca5a5;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Camera modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: min(500px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    color: var(--accent-blue);
  }

  #cameraVideo {
    width: 100%;
    border-radius: 10px;
    background: #000;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: flex-end;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .btn-snap {
    background: linear-gradient(135deg, var(--accent-poke), #f59e0b);
    color: #000;
    font-weight: 700;
  }

  /* No price state */
  .no-price {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  /* Scan history */
  .history-section {
    margin-top: 40px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-item:hover { border-color: var(--accent-blue); }

  .history-name {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .history-type {
    font-size: 11px;
    color: var(--muted);
  }

  .history-price {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #22c55e;
  }

  .history-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .history-clear:hover { border-color: #ef4444; color: #ef4444; }

  @media (max-width: 480px) {
    .result-header { flex-direction: column; }
    .price-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">Card Scanner</div>
    <div class="logo-sub">Pokemon &middot; Yu-Gi-Oh &middot; Price Intel</div>
    <div class="divider"></div>
  </header>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <span class="upload-icon">&#x1F0CF;</span>
    <div class="upload-title">Drop Your Card Here</div>
    <div class="upload-hint">
      Drag &amp; drop a card image, or <span onclick="document.getElementById('fileInput').click()">browse files</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" />
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
      Choose Image
    </button>
    <button class="btn btn-primary" onclick="openCamera()" id="cameraBtn">
      Use Camera
    </button>
    <button class="btn btn-primary" id="scanBtn" onclick="scanCard()" disabled>
      Identify &amp; Price
    </button>
  </div>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="Card preview" />
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">Scanning card...</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div>
        <div id="cardTypeBadge" class="card-type-badge badge-pokemon">Pokemon</div>
      </div>
      <div class="result-info">
        <div class="result-name" id="cardName">&mdash;</div>
        <div class="result-meta" id="cardMeta"></div>
      </div>
    </div>
    <div class="prices-section">
      <div class="section-title">Market Prices (USD)</div>
      <div class="price-grid" id="priceGrid"></div>
    </div>
    <div class="desc-section">
      <div class="section-title">AI Analysis</div>
      <div class="ai-description" id="aiDescription"></div>
    </div>
  </div>

  <!-- Scan History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-title" style="margin-bottom:16px">Recent Scans</div>
    <div class="history-list" id="historyList"></div>
    <button class="history-clear" onclick="clearHistory()">Clear History</button>
  </div>

</div>

<!-- Camera Modal -->
<div class="modal-overlay" id="cameraModal">
  <div class="modal">
    <div class="modal-title">Camera Scanner</div>
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="cameraCanvas" style="display:none"></canvas>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeCamera()">Cancel</button>
      <button class="btn btn-primary btn-snap" onclick="snapPhoto()">Snap</button>
    </div>
  </div>
</div>

<script>
let currentImageBase64 = null;
let currentMediaType = 'image/jpeg';
let cameraStream = null;

// ── File input ───────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadImageFile(file);
});

// Drag and drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
});

function loadImageFile(file) {
  currentMediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentImageBase64 = dataUrl.split(',')[1];
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('scanBtn').disabled = false;
    hideResults();
  };
  reader.readAsDataURL(file);
}

// ── Camera ───────────────────────────────────────────────────
async function openCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    document.getElementById('cameraVideo').srcObject = cameraStream;
    document.getElementById('cameraModal').style.display = 'flex';
  } catch {
    showError('Camera access denied. Please use the file upload instead.');
  }
}

function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraModal').style.display = 'none';
}

function snapPhoto() {
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('cameraCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  currentImageBase64 = dataUrl.split(',')[1];
  currentMediaType = 'image/jpeg';
  document.getElementById('previewImg').src = dataUrl;
  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('scanBtn').disabled = false;
  hideResults();
  closeCamera();
}

// ── Main scan ────────────────────────────────────────────────
async function scanCard() {
  if (!currentImageBase64) { showError('Please load a card image first.'); return; }

  setStatus('Identifying card with AI...');
  hideResults();
  document.getElementById('scanBtn').disabled = true;

  try {
    // Step 1: Identify card via Netlify Function
    const cardInfo = await identifyCard(currentImageBase64, currentMediaType);
    setStatus('Found: ' + cardInfo.name + ' \u2014 fetching prices...');

    // Step 2: Fetch prices
    let prices = {};
    if (cardInfo.type === 'pokemon') {
      prices = await fetchPokemonPrices(cardInfo.name, cardInfo.set);
    } else if (cardInfo.type === 'yugioh') {
      prices = await fetchYugiohPrices(cardInfo.name);
    }

    // Step 3: Display
    displayResult(cardInfo, prices);
    saveToHistory(cardInfo, prices);
    hideStatus();

  } catch (err) {
    hideStatus();
    showError('Scan failed: ' + err.message);
  } finally {
    document.getElementById('scanBtn').disabled = false;
  }
}

// ── Card identification via Netlify Function ─────────────────
async function identifyCard(base64, mediaType) {
  const res = await fetch('/api/identify-card', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: base64, mediaType: mediaType })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || 'Card identification failed (status ' + res.status + ')');
  }

  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── Pokemon prices via pokemontcg.io ─────────────────────────
async function fetchPokemonPrices(name, set) {
  try {
    const query = encodeURIComponent(name);
    const res = await fetch('https://api.pokemontcg.io/v2/cards?q=name:"' + query + '"&pageSize=10');
    if (!res.ok) throw new Error('TCG API error');
    const data = await res.json();

    if (!data.data || data.data.length === 0) return { source: 'Pokemon TCG API', note: 'No price data found for this card.' };

    // Find best match (prefer matching set if possible)
    let card = data.data[0];
    if (set) {
      const setLower = set.toLowerCase();
      const match = data.data.find(c => c.set && c.set.name && c.set.name.toLowerCase().includes(setLower));
      if (match) card = match;
    }

    const prices = card.tcgplayer && card.tcgplayer.prices ? card.tcgplayer.prices : {};
    const result = { source: 'TCGPlayer via Pokemon TCG API', cardFound: card.name, set: card.set ? card.set.name : '' };

    if (prices.normal) result.Normal = prices.normal.market || prices.normal.mid;
    if (prices.holofoil) result.Holofoil = prices.holofoil.market || prices.holofoil.mid;
    if (prices.reverseHolofoil) result['Reverse Holo'] = prices.reverseHolofoil.market || prices.reverseHolofoil.mid;
    if (prices['1stEditionHolofoil']) result['1st Ed Holo'] = prices['1stEditionHolofoil'].market;
    if (prices['1stEditionNormal']) result['1st Ed Normal'] = prices['1stEditionNormal'].market;

    return result;
  } catch (e) {
    return { source: 'Pokemon TCG API', note: 'Could not fetch prices: ' + e.message };
  }
}

// ── Yu-Gi-Oh prices via YGOPRODeck ───────────────────────────
async function fetchYugiohPrices(name) {
  try {
    const query = encodeURIComponent(name);
    const res = await fetch('https://db.ygoprodeck.com/api/v7/cardinfo.php?name=' + query);
    if (!res.ok) {
      // Try fuzzy search
      const fuzzy = await fetch('https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=' + query + '&num=5&offset=0');
      if (!fuzzy.ok) throw new Error('YGOPRODeck API error');
      const fd = await fuzzy.json();
      if (!fd.data || fd.data.length === 0) return { source: 'YGOPRODeck', note: 'Card not found' };
      return extractYgoPrices(fd.data[0]);
    }
    const data = await res.json();
    if (!data.data || data.data.length === 0) return { source: 'YGOPRODeck', note: 'No data' };
    return extractYgoPrices(data.data[0]);
  } catch (e) {
    return { source: 'YGOPRODeck', note: 'Could not fetch prices: ' + e.message };
  }
}

function extractYgoPrices(card) {
  const result = { source: 'YGOPRODeck', cardFound: card.name };
  if (!card.card_prices || card.card_prices.length === 0) return result;
  const p = card.card_prices[0];
  if (p.tcgplayer_price) result['TCGPlayer'] = parseFloat(p.tcgplayer_price);
  if (p.cardmarket_price) result['Card Market'] = parseFloat(p.cardmarket_price);
  if (p.ebay_price) result['eBay'] = parseFloat(p.ebay_price);
  if (p.amazon_price) result['Amazon'] = parseFloat(p.amazon_price);
  if (p.coolstuffinc_price) result['Cool Stuff Inc'] = parseFloat(p.coolstuffinc_price);
  return result;
}

// ── Display ──────────────────────────────────────────────────
function displayResult(cardInfo, prices) {
  const isPoke = cardInfo.type === 'pokemon';
  const isYgo = cardInfo.type === 'yugioh';

  // Badge
  const badge = document.getElementById('cardTypeBadge');
  badge.textContent = isPoke ? 'Pokemon' : (isYgo ? 'Yu-Gi-Oh!' : 'Unknown');
  badge.className = 'card-type-badge ' + (isPoke ? 'badge-pokemon' : 'badge-yugioh');

  // Name
  document.getElementById('cardName').textContent = cardInfo.name || 'Unknown Card';

  // Meta
  let meta = '';
  if (cardInfo.set) meta += '<strong>Set:</strong> ' + escapeHtml(cardInfo.set) + '<br>';
  if (cardInfo.number) meta += '<strong>Number:</strong> ' + escapeHtml(cardInfo.number) + '<br>';
  if (cardInfo.rarity) meta += '<strong>Rarity:</strong> ' + escapeHtml(cardInfo.rarity) + '<br>';
  if (cardInfo.cardType) meta += '<strong>Type:</strong> ' + escapeHtml(cardInfo.cardType) + '<br>';
  if (cardInfo.year) meta += '<strong>Year:</strong> ' + escapeHtml(cardInfo.year) + '<br>';
  if (prices.source) meta += '<strong>Price Source:</strong> ' + escapeHtml(prices.source);
  document.getElementById('cardMeta').innerHTML = meta;

  // Prices
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = '';

  const skipKeys = ['source', 'cardFound', 'set', 'note'];
  const priceKeys = Object.keys(prices).filter(k => !skipKeys.includes(k));

  if (priceKeys.length === 0) {
    const note = prices.note || 'No pricing data available for this card.';
    grid.innerHTML = '<div class="no-price" style="grid-column:1/-1">' + escapeHtml(note) + '</div>';
  } else {
    const colorMap = {
      'Normal': 'price-normal', 'Holofoil': 'price-holofoil', 'Reverse Holo': 'price-reverseHolo',
      '1st Ed Holo': 'price-1stEdition', '1st Ed Normal': 'price-1stEdition',
      'TCGPlayer': 'price-market', 'Card Market': 'price-mid', 'eBay': 'price-high',
      'Amazon': 'price-low', 'Cool Stuff Inc': 'price-unlimited'
    };
    priceKeys.forEach(function(key) {
      var val = prices[key];
      if (!val && val !== 0) return;
      var color = colorMap[key] || 'price-normal';
      var formatted = typeof val === 'number' ? '$' + val.toFixed(2) : '$' + parseFloat(val).toFixed(2);
      grid.innerHTML += '<div class="price-item"><div class="price-label">' + escapeHtml(key) + '</div><div class="price-value ' + color + '">' + formatted + '</div></div>';
    });
  }

  document.getElementById('aiDescription').textContent = cardInfo.description || '';
  document.getElementById('resultCard').style.display = 'block';
}

// ── Scan History ─────────────────────────────────────────────
function saveToHistory(cardInfo, prices) {
  var history = JSON.parse(localStorage.getItem('scan_history') || '[]');
  var topPrice = 0;
  var skipKeys = ['source', 'cardFound', 'set', 'note'];
  Object.keys(prices).forEach(function(k) {
    if (!skipKeys.includes(k)) {
      var v = parseFloat(prices[k]);
      if (v > topPrice) topPrice = v;
    }
  });
  history.unshift({
    name: cardInfo.name,
    type: cardInfo.type,
    topPrice: topPrice,
    time: new Date().toISOString()
  });
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('scan_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  var history = JSON.parse(localStorage.getItem('scan_history') || '[]');
  var section = document.getElementById('historySection');
  var list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = '';
  history.forEach(function(item) {
    var typeLabel = item.type === 'pokemon' ? 'Pokemon' : (item.type === 'yugioh' ? 'Yu-Gi-Oh!' : 'Card');
    var priceText = item.topPrice > 0 ? '$' + item.topPrice.toFixed(2) : 'N/A';
    list.innerHTML += '<div class="history-item"><div><div class="history-name">' + escapeHtml(item.name) + '</div><div class="history-type">' + typeLabel + '</div></div><div class="history-price">' + priceText + '</div></div>';
  });
}

function clearHistory() {
  localStorage.removeItem('scan_history');
  renderHistory();
}

// Load history on start
window.addEventListener('load', renderHistory);

// ── UI helpers ───────────────────────────────────────────────
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function setStatus(msg) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusBar').style.display = 'flex';
}

function hideStatus() {
  document.getElementById('statusBar').style.display = 'none';
}

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}

function hideResults() {
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
}

// ── PWA Service Worker ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
